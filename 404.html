<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 - Page Not Found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;

      min-height:100vh;

      display:flex;

      align-items:center;

      justify-content:center;

      overflow:hidden;

      background:
      linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #111827
      );

      position:relative;
    }

    /* GLOW */

    body::before{

      content:"";

      position:absolute;

      width:600px;
      height:600px;

      border-radius:50%;

      background:
      radial-gradient(
        rgba(37,99,235,0.22),
        transparent 70%
      );

      top:-250px;
      left:-200px;

      filter:blur(120px);

      animation:
      glowMove 8s ease-in-out infinite;
    }

    body::after{

      content:"";

      position:absolute;

      width:450px;
      height:450px;

      border-radius:50%;

      background:
      radial-gradient(
        rgba(0,198,255,0.15),
        transparent 70%
      );

      bottom:-180px;
      right:-120px;

      filter:blur(120px);

      animation:
      glowMoveTwo 10s ease-in-out infinite;
    }

    @keyframes glowMove{

      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(40px,30px);
      }
    }

    @keyframes glowMoveTwo{

      0%,100%{
        transform:translate(0,0);
      }

      50%{
        transform:translate(-30px,-20px);
      }
    }

    /* CARD */

    .error-box{

      position:relative;

      z-index:5;

      width:90%;

      max-width:620px;

      padding:70px 50px;

      text-align:center;

      border-radius:34px;

      background:
      rgba(255,255,255,0.06);

      border:
      1px solid rgba(255,255,255,0.10);

      backdrop-filter:blur(14px);

      box-shadow:
      0 25px 70px rgba(0,0,0,0.35);
    }

    /* 404 */

    .error-code{

      font-size:120px;

      font-weight:800;

      line-height:1;

      color:white;

      margin-bottom:20px;

      letter-spacing:-4px;

      text-shadow:
      0 0 20px rgba(37,99,235,0.35);
    }

    /* TITLE */

    .error-box h2{

      font-size:38px;

      color:white;

      margin-bottom:18px;

      font-weight:700;
    }

    /* TEXT */

    .error-box p{

      font-size:17px;

      line-height:1.9;

      color:#cbd5e1;

      margin-bottom:38px;
    }

    /* BUTTONS */

    .btn-group{

      display:flex;

      justify-content:center;

      gap:18px;

      flex-wrap:wrap;
    }

    /* BUTTON */

    .btn{

      display:inline-flex;

      align-items:center;

      justify-content:center;

      min-width:190px;

      padding:16px 28px;

      border-radius:14px;

      font-size:15px;

      font-weight:600;

      text-decoration:none;

      transition:0.35s ease;

      border:none;

      cursor:pointer;
    }

    /* PRIMARY */

    .btn-primary{

      background:
      linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
      );

      color:white;

      box-shadow:
      0 18px 40px rgba(37,99,235,0.28);
    }

    /* SECONDARY */

    .btn-outline{

      border:
      1px solid rgba(255,255,255,0.20);

      background:
      rgba(255,255,255,0.04);

      backdrop-filter:blur(10px);

      color:white;
    }

    /* HOVER */

    .btn:hover{

      transform:translateY(-5px);
    }

    .btn-primary:hover{

      box-shadow:
      0 25px 50px rgba(37,99,235,0.40);
    }

    .btn-outline:hover{

      background:white;

      color:#111827;
    }

    /* MOBILE */

    @media(max-width:768px){

      .error-box{

        padding:60px 28px;
      }

      .error-code{

        font-size:90px;
      }

      .error-box h2{

        font-size:28px;
      }

      .error-box p{

        font-size:15px;
      }

      .btn{

        width:100%;
      }

    }

  </style>

</head>

<body>

  <div class="error-box">

    <div class="error-code">
      404
    </div>

    <h2>
      Oops! Page Not Found
    </h2>

    <p>
      The page you are looking for might have been removed,
      renamed, or is temporarily unavailable.
    </p>

    <div class="btn-group">

      <a href="index.html" class="btn btn-primary">
        🏠 Back to Home
      </a>

      <button onclick="history.back()" class="btn btn-outline">
        ← Go Back
      </button>

    </div>

  </div>

</body>

</html>
